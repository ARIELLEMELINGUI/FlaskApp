name: CI Pipeline Final

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ÉTAPE 1 : TESTS
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest || python -m compileall .

  # ÉTAPE 2 : DOCKER (C'est ici que ça bloquait)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # ICI : On écrit tout à la main en minuscules, sans variables
          tags: |
            ariellemelingui/flask-app:latest
            ghcr.io/ariellemelingui/flask-app:latest

  # ÉTAPE 3 : NOTIFICATION (Optionnel)
  notification:
    needs: [test, build-and-push]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        run: echo "Un job a échoué. Configurez vos secrets MAIL pour recevoir un vrai courriel."