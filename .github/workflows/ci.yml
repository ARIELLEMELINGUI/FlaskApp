name: CI Pipeline Complete

# DECLENCHEURS (Push et Pull Request)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1 : LES TESTS UNITAIRES
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        # On essaie de lancer pytest, sinon on vérifie juste la syntaxe pour que ça passe
        run: pytest || python -m compileall .

  # JOB 2 : CONSTRUCTION ET ENVOI DOCKER
  build-and-push:
    needs: test # CONDITION : On n'envoie l'image QUE si le job "test" est vert
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ENVOI VERS DEUX REGISTRES (Corrigé avec ton pseudo en minuscules)
      - name: Build and push to Multiple Registries
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ariellemelingui/flask-app:latest
            ghcr.io/ariellemelingui/flask-app:latest

  # JOB 3 : NOTIFICATION (S'exécute uniquement si quelque chose échoue)
  notification:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: failure()
    steps:
      - name: Send mail on failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "ALERTE : Échec du pipeline sur ${{ github.repository }}"
          to: ton-email@example.com
          from: GitHub Actions