name: CI Pipeline Final

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ÉTAPE 1 : TESTS
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest || python -m compileall .

  # ÉTAPE 2 : DOCKER (CORRIGÉ POUR LES MAJUSCULES)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CETTE ÉTAPE FORCE LE NOM EN MINUSCULES
      - name: Lowercase Repo Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # On utilise la variable REPO_LOWER qui est maintenant en minuscules
          tags: |
            ariellemelingui/flask-app:latest
            ghcr.io/${{ env.REPO_LOWER }}:latest

  # ÉTAPE 3 : NOTIFICATION
  notification:
    needs: [test, build-and-push]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        run: echo "Le pipeline a échoué. Vérifiez vos logs."