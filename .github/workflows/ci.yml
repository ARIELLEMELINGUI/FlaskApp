name: CI Pipeline Complete

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1 : Exécuter des tests unitaires (En parallèle)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run unit tests
        # On tente de lancer pytest, sinon on compile juste pour vérifier la syntaxe
        run: pytest || python -m compileall .

      # Notification par email si ce job échoue
      - name: Send mail on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "ALERTE : Échec des tests sur ${{ github.repository }}"
          to: ton-email@example.com
          from: GitHub Actions

  # JOB 2 : Construction et envoi Docker
  build-and-push:
    needs: unit-tests # CONDITION : N'exécuter que si les tests sont passés
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Toujours en minuscules pour éviter les erreurs
          tags: ariellemelingui/flask-app:latest