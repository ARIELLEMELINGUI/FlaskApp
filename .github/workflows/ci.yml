name: CI Pipeline Final

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ÉTAPE 1 : TESTS
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest || python -m compileall .

  # ÉTAPE 2 : DOCKER (VERSION SÉCURISÉE SANS MAJUSCULES)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # On définit une variable "IMAGE_NAME" en minuscules ici pour tout le job
    env:
      IMAGE_NAME: ghcr.io/ariellemelingui/flask-app
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # On utilise notre variable IMAGE_NAME qui est 100% en minuscules
          tags: |
            ariellemelingui/flask-app:latest
            ${{ env.IMAGE_NAME }}:latest

  # ÉTAPE 3 : NOTIFICATION
  notification:
    needs: [test, build-and-push]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        run: echo "Le pipeline a échoué."